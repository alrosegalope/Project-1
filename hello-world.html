<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi, my name is Alrose!</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18222f;
      --muted: #5d6877;
      --paper: #fffdf8;
      --accent: #b7634d;
      --accent-dark: #7f3f37;
      --line: rgba(24, 34, 47, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(183, 99, 77, 0.16), transparent 34%),
        linear-gradient(135deg, #f8f1e8 0%, #edf4f1 48%, #fdfbf6 100%);
    }

    main {
      width: min(720px, 100%);
      padding: clamp(36px, 8vw, 72px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.82);
      box-shadow: 0 24px 80px rgba(24, 34, 47, 0.12);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 12vw, 7.5rem);
      line-height: 0.92;
      font-weight: 400;
      letter-spacing: 0;
    }

    p {
      max-width: 44rem;
      margin: 28px 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.7;
      color: var(--muted);
    }

    .rule {
      width: 84px;
      height: 3px;
      margin-top: 34px;
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">A simple beginning</p>
    <h1>Hi,<br>my name is Alrose.</h1>
    <p>A quiet little page with warm light, crisp type, and just enough ceremony for the first words of a new project.</p>
    <div class="rule" aria-hidden="true"></div>
  </main>
</body>
</html>
